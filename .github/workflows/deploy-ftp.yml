name: Deploy na seohost (FTPS)

# Każdy push do gałęzi 'main' automatycznie wgrywa pliki strony na seohost
# przez FTPS (FTP po TLS, port 21) używając lftp. Dodatkowo workflow generuje
# smtp_config.php z GitHub Secrets — hasło SMTP nigdy nie pojawia się w repo.
# Można też uruchomić ręcznie z zakładki Actions ("Run workflow").

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  # nie przerywaj deploya w połowie uploadu — niech skończy, kolejny w kolejce
  cancel-in-progress: false

jobs:
  deploy:
    name: Wgranie strony na seohost
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Pobierz kod
        uses: actions/checkout@v4

      # Generuj smtp_config.php z GitHub Secrets.
      # Hasło SMTP nigdy nie wpada do repo — żyje tylko w Secrets i na serwerze.
      # var_export() poprawnie escapuje dowolne znaki w haśle.
      - name: 🔐 Wygeneruj smtp_config.php z secretów
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_FROM_NAME: ${{ secrets.SMTP_FROM_NAME }}
          SMTP_TO: ${{ secrets.SMTP_TO }}
        run: |
          php -r '
            $c = [
              "host"     => getenv("SMTP_HOST")      ?: "",
              "port"     => (int) (getenv("SMTP_PORT") ?: 465),
              "secure"   => getenv("SMTP_SECURE")    ?: "ssl",
              "username" => getenv("SMTP_USER")      ?: "",
              "password" => getenv("SMTP_PASS")      ?: "",
              "from"     => getenv("SMTP_FROM")      ?: "",
              "fromName" => getenv("SMTP_FROM_NAME") ?: "AllesKlar IT Service",
              "to"       => getenv("SMTP_TO")        ?: "",
              "timeout"  => 20,
            ];
            file_put_contents("smtp_config.php", "<?php\n// Generowane automatycznie przy deploy z GitHub Secrets — nie edytować ręcznie.\nreturn " . var_export($c, true) . ";\n");
          '
          echo "smtp_config.php zapisany ($(wc -c < smtp_config.php) bajtów)"

      # Generuj api/api_keys.php z GitHub Secrets — klucze Stripe + Claude.
      # Plik trafia tylko na hosting, nigdy do repo (jest w .gitignore).
      - name: 🔐 Wygeneruj api/api_keys.php (Stripe + Claude)
        env:
          STRIPE_SECRET_KEY:       ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_PUBLISHABLE_KEY:  ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          STRIPE_WEBHOOK_SECRET:   ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          ANTHROPIC_API_KEY:       ${{ secrets.ANTHROPIC_API_KEY }}
          STRIPE_PRICE_AMOUNT:     ${{ secrets.STRIPE_PRICE_AMOUNT || vars.STRIPE_PRICE_AMOUNT || '499' }}
          SITE_URL:                ${{ secrets.SITE_URL || vars.SITE_URL || 'https://allesklar-it-service.de' }}
        run: |
          mkdir -p api
          php -r '
            $c = [
              "stripe_secret_key"      => getenv("STRIPE_SECRET_KEY")      ?: "",
              "stripe_publishable_key" => getenv("STRIPE_PUBLISHABLE_KEY") ?: "",
              "stripe_webhook_secret"  => getenv("STRIPE_WEBHOOK_SECRET")  ?: "",
              "anthropic_api_key"      => getenv("ANTHROPIC_API_KEY")      ?: "",
              "stripe_price_amount"    => (int) (getenv("STRIPE_PRICE_AMOUNT") ?: 499),
              "stripe_currency"        => "eur",
              "site_url"               => getenv("SITE_URL") ?: "https://allesklar-it-service.de",
            ];
            file_put_contents("api/api_keys.php", "<?php\n// Generowane automatycznie przy deploy z GitHub Secrets — nie edytować ręcznie.\nreturn " . var_export($c, true) . ";\n");
          '
          echo "api/api_keys.php zapisany ($(wc -c < api/api_keys.php) bajtów)"

      # Dla bezpieczeństwa: trzymamy też zbudowany "snapshot" jako artefakt
      # GitHuba przez 7 dni — gdyby FTP padł, można pobrać i wgrać ręcznie.
      - name: 💾 Zapisz pliki jako artefakt (backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: site-snapshot
          path: |
            .
            !.git
            !.github
            !.claude
            !node_modules
            !*.mobileconfig
          retention-days: 7

      # Wgranie na seohost przez FTPS używając lftp.
      # lftp używa tej samej sesji TLS dla kanału danych co dla kontrolnego —
      # tego wymaga seohost (vsftpd require_ssl_reuse). Prostsze biblioteki
      # (basic-ftp, SamKirkland action) na tym wykładają się.
      - name: 📤 Wgraj na seohost (FTPS przez lftp)
        env:
          FTP_HOST: ${{ secrets.FTP_SERVER }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT || vars.FTP_PORT || '21' }}
          REMOTE_DIR: ${{ secrets.FTP_SERVER_DIR || vars.FTP_SERVER_DIR || './' }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp
          # lftp NIE obsługuje line-continuation '\' w skryptach.
          # Cała komenda 'mirror' musi być w JEDNEJ linii, inaczej kolejne
          # linie są traktowane jako osobne komendy i excludes nie działają
          # (co wcześniej spowodowało wgranie .git/ na publiczny serwer).
          MIRROR_CMD="mirror --reverse --verbose --delete --no-perms"
          MIRROR_CMD="$MIRROR_CMD --exclude-glob .git --exclude-glob .git/**"
          MIRROR_CMD="$MIRROR_CMD --exclude-glob .gitignore"
          MIRROR_CMD="$MIRROR_CMD --exclude-glob .gitattributes"
          MIRROR_CMD="$MIRROR_CMD --exclude-glob .github --exclude-glob .github/**"
          MIRROR_CMD="$MIRROR_CMD --exclude-glob .claude --exclude-glob .claude/**"
          MIRROR_CMD="$MIRROR_CMD --exclude-glob node_modules --exclude-glob node_modules/**"
          MIRROR_CMD="$MIRROR_CMD --exclude-glob .env --exclude-glob .env.* --exclude-glob .env.example"
          MIRROR_CMD="$MIRROR_CMD --exclude-glob *.mobileconfig"
          MIRROR_CMD="$MIRROR_CMD --exclude-glob smtp_config.example.php"
          MIRROR_CMD="$MIRROR_CMD --exclude-glob README.md"
          MIRROR_CMD="$MIRROR_CMD --exclude-glob .DS_Store --exclude-glob Thumbs.db"
          MIRROR_CMD="$MIRROR_CMD ./ \"$REMOTE_DIR\""

          {
            echo "set cmd:fail-exit yes"
            echo "set net:max-retries 3"
            echo "set net:timeout 25"
            echo "set net:reconnect-interval-base 5"
            echo "set ftp:ssl-allow yes"
            echo "set ftp:ssl-force yes"
            echo "set ftp:ssl-protect-data yes"
            echo "set ssl:verify-certificate no"
            echo "set ftp:passive-mode yes"
            echo "open -u \"$FTP_USER\",\"$FTP_PASS\" -p \"$FTP_PORT\" \"ftp://$FTP_HOST\""
            echo "$MIRROR_CMD"
            echo "bye"
          } > /tmp/lftp.cmds
          lftp -f /tmp/lftp.cmds
