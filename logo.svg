<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
    <defs>
        <linearGradient id="bubbleGrad" x1="10%" y1="0%" x2="90%" y2="100%">
            <stop offset="0%" stop-color="#FCD34D"/>
            <stop offset="55%" stop-color="#F59E0B"/>
            <stop offset="100%" stop-color="#EC4899"/>
        </linearGradient>
        <linearGradient id="sparkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#4F46E5"/>
            <stop offset="100%" stop-color="#06B6D4"/>
        </linearGradient>
    </defs>

    <!-- Speech bubble with tail -->
    <path d="M32 5 C15.4 5, 3 15.7, 3 29.5 C3 38, 7.7 45.5, 15.5 49.7 L11.5 60.5 L26 52.6 C28 53, 30 53.3, 32 53.3 C48.6 53.3, 61 42.6, 61 29.5 C61 15.7, 48.6 5, 32 5 Z"
          fill="url(#bubbleGrad)"/>

    <!-- Left eye (open) -->
    <circle cx="22.5" cy="26" r="3.4" fill="#0F172A"/>
    <circle cx="23.5" cy="24.8" r="1.1" fill="white"/>

    <!-- Right eye (wink) -->
    <path d="M37.5 25.5 Q41.7 22, 46 25.5" stroke="#0F172A" stroke-width="3.2" stroke-linecap="round" fill="none"/>

    <!-- Smile -->
    <path d="M20 34.5 Q31 44, 42.5 34.5" stroke="#0F172A" stroke-width="3.6" stroke-linecap="round" fill="none"/>

    <!-- Sparkle accent -->
    <path d="M55 9 L56.6 13 L60.6 14.6 L56.6 16.2 L55 20.2 L53.4 16.2 L49.4 14.6 L53.4 13 Z" fill="url(#sparkGrad)"/>
</svg>
